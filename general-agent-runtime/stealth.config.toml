# ~/.codex/stealth.config.toml
# PROFILE: stealth — minimal overhead, fast cold start, surgical execution
# Activate: codex --profile stealth
# Use for: quick file edits, fast one-shot tasks, low-latency runs

model = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
hide_agent_reasoning = true
show_raw_agent_reasoning = false

# No context preloading — leaner start
developer_instructions = "Lean mode. Execute the task. bb7_exo_bootstrap then go."
model_instructions_file = "AGENTS.override.md"

web_search = "cached"
tool_output_token_limit = 50000

approval_policy = "never"
sandbox_mode = "danger-full-access"

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
SOVEREIGN_PROFILE = "stealth"
MUADDIB_ACTIVE = "1"
SOVEREIGN_DATA_DIR = "/home/daeron/Somnus-MCP/data"
BB7_DAEMON_TICK_MS = "0"  # daemon ticks off — stealth means no background

[features]
hooks = true
multi_agent = false
unified_exec = true
tool_search = true
tool_search_always_defer_mcp_tools = false
memories = false  # no memory load overhead on cold start
shell_snapshot = false
shell_tool = true
chronicle = false
prevent_idle_sleep = false
fast_mode = false  # still no; just lean
apply_patch_streaming_events = false
