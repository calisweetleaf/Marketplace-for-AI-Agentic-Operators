name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build plugin zip and create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run validation suite before releasing
        run: |
          bash tests/run-all.sh
        env:
          PYTHON_BIN: python3.12

      - name: Determine release version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Build plugin zip
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE_NAME="ctmv3-plugin-${TAG}.zip"
          STAGING_DIR="$(mktemp -d)/ctmv3-plugin"
          mkdir -p "$STAGING_DIR"

          # Copy plugin contents, excluding build artifacts and CI config
          rsync -av \
            --exclude-from='.releaseignore' \
            --exclude='.github/' \
            --exclude='.git/' \
            . "$STAGING_DIR/"

          # Create the zip from the staging directory's parent
          PARENT_DIR="$(dirname "$STAGING_DIR")"
          cd "$PARENT_DIR"
          zip -r "$ARCHIVE_NAME" "ctmv3-plugin/"
          mv "$PARENT_DIR/$ARCHIVE_NAME" "$GITHUB_WORKSPACE/$ARCHIVE_NAME"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"
          echo "Archive created: $ARCHIVE_NAME"
          unzip -l "$GITHUB_WORKSPACE/$ARCHIVE_NAME" | tail -5

      - name: Compute archive SHA-256
        id: checksum
        run: |
          SHA=$(sha256sum "$ARCHIVE_NAME" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Create GitHub release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: CTMv3 Plugin ${{ steps.version.outputs.tag }}
          body: |
            CTMv3 Plugin ${{ steps.version.outputs.tag }}

            SHA-256: `${{ steps.checksum.outputs.sha256 }}`

            Install by downloading the zip and running:
            ```bash
            unzip ctmv3-plugin-${{ steps.version.outputs.tag }}.zip
            cd ctmv3-plugin
            cd core && pip install --user .
            # Then install the runtime adapter you use; see INSTALL.md.
            ```

            See README.md for full installation instructions.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc') || contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') }}

      - name: Upload plugin zip to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.ARCHIVE_NAME }}
          asset_name: ${{ env.ARCHIVE_NAME }}
          asset_content_type: application/zip
