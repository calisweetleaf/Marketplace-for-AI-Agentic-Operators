description = "Run CTMv3 warm-start check: diff current state against last session"

prompt = """
Run the CTMv3 warm-start check:

!{bash "${extensionPath}/scripts/ctmv3-wrap.sh" warm}

Perform the three-question warm validity check and report:

1. Topology valid? — Has significant new code been added since the last CTMv3
   encoding? Check git log since PROVENANCE.md Session Log timestamp if git
   is available.

2. Provenance coherent? — Does the Session Log's last action match the current
   state of AGENTS.md and ARCHITECTURE_MAP.md?

3. No rejected path in play? — Does the current task match anything in the
   PROVENANCE.md Rejected Alternatives (Graveyard)?

If all three pass: report "Warm start valid — continuing from last session."
State the last action from the Session Log and the recommended next step.

If any fail: report which check failed and recommend targeted partial
archaeology. Do not rebuild from scratch — identify only the delta that needs
updating.
"""
