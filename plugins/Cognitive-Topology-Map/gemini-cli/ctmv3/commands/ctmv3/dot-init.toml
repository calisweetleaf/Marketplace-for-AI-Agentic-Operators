description = "Create .claude/, .codex/, .github/ scaffolds and seed their contents"

prompt = """
Initialize the .xyz agent ecosystem directories for this repo.

!{bash "${extensionPath}/scripts/ctmv3-wrap.sh" dot-init}

This command creates and seeds:

.github/
  copilot-instructions.md   repo-wide agent instruction (navigable map, not summary)
  instructions/             per-path agent context files (for DENSE complexity modules)
  workflows/                CI enforcement gates (topology enforcement, manifest verify)

.claude/
  settings.json             permissions: allow list + deny list for Claude Code
  CLAUDE.md                 Claude-specific operational context

.codex/
  skills/                   directory for CTM skill package installs

Build sequence follows the required order:
1. TOPOLOGY.md must exist before .github/ is built (hooks enforce topology contracts)
2. AGENTS.md posture is defined before .github/ hooks (enforcement without definition
   is harmful)
3. .sovereign/ is initialized last (anchors to completed artifacts)

Report which directories and files were created, which already existed and were
skipped, and any files that required manual review due to conflicting content.
"""
